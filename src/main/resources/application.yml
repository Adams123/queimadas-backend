## default connection pool

spring:
  datasource:
    initialization-mode: always
    hikari:
      connectionTimeout: 20000
      maximumPoolSize: 5
    url: ${PG_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${PG_USER:postgres}
    password: ${PG_PASS}
    data: "classpath:scripts/data.sql"
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  mvc:
    locale: pt_BR

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
management:
  endpoint:
    health:
      show-components: always
      show-details: always
server:
  port: ${SERVER_PORT:8666}
  address: ${SERVER_URL:}