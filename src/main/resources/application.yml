## default connection pool

spring:
  datasource:
    initialization-mode: always
    hikari:
      connectionTimeout: 20000
      maximumPoolSize: 5
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASS}
    data: "classpath:scripts/data.sql"
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  mvc:
    locale: pt_BR

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

server:
  port: ${SERVER_PORT}
  address: ${SERVER_URL:}